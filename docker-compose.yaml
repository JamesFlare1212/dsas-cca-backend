services:
  warp-proxy:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    container_name: dsas-cca-warp-proxy
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - cca_network
    logging:
      driver: "json-file"
      options:
        max-size: "15m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsas-cca-backend
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      # Proxy configuration (only active when USE_PROXY=true)
      - USE_PROXY=${USE_PROXY:-false}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      warp-proxy:
        condition: service_started
    volumes:
      - ./services/cookies.json:/usr/src/app/services/cookies.json
    networks:
      - cca_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "15m"
        max-file: "3"

  redis:
    image: "redis:8.0-alpine"
    container_name: dsas-cca-redis
    command: redis-server --requirepass "dsas-cca"
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    networks:
      - cca_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dsas-cca", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "15m"
        max-file: "3"

networks:
  cca_network:
    driver: bridge
